name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "MOONDREAM_AUTH=${{ secrets.MOONDREAM_AUTH }}" >> local.properties
          echo "PUTER_AUTH_TOKEN=${{ secrets.PUTER_AUTH_TOKEN }}" >> local.properties
          echo "ZIMAGE_API_KEY=${{ secrets.ZIMAGE_API_KEY }}" >> local.properties
          echo "GROK_API_KEY=${{ secrets.GROK_API_KEY }}" >> local.properties

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
